name: Container Security Scan

on:
  push:
    branches:
      - master
      - devops-extension

  pull_request:
    branches:
      - master

  workflow_dispatch:

permissions:
  contents: read

jobs:
  trivy-scan:
    name: Scan container images
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build backend image
        run: |
          docker build \
            --tag requestflow-backend:${{ github.sha }} \
            ./backend

      - name: Scan backend image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: requestflow-backend:${{ github.sha }}
          format: table
          scanners: vuln
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          timeout: 10m0s

      - name: Build frontend image
        run: |
          docker build \
            --build-arg VITE_API_BASE_URL=/api \
            --tag requestflow-frontend:${{ github.sha }} \
            ./frontend

      - name: Scan frontend image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: requestflow-frontend:${{ github.sha }}
          format: table
          scanners: vuln
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          timeout: 10m0s
          skip-setup-trivy: true