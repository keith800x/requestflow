deployment:
  replicas: 1

ingressClass:
  enabled: true
  isDefaultClass: false
  name: traefik

providers:
  kubernetesIngress:
    enabled: true

  kubernetesCRD:
    enabled: true

service:
  type: LoadBalancer

ports:
  web:
    expose:
      default: true
    exposedPort: 80

  websecure:
    expose:
      default: false

log:
  level: INFO

accessLog:
  format: common