apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasource
  namespace: requestflow
data:
  prometheus.yml: |
    apiVersion: 1

    prune: true

    datasources:
      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: http://requestflow-prometheus:9090
        isDefault: true
        editable: false

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: requestflow
data:
  dashboards.yml: |
    apiVersion: 1

    providers:
      - name: requestflow-dashboards
        orgId: 1
        folder: RequestFlow
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        allowUiUpdates: false

        options:
          path: /var/lib/grafana/dashboards
          foldersFromFilesStructure: false