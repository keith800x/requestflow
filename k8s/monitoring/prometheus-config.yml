apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: requestflow
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: "prometheus"
        static_configs:
          - targets:
              - "localhost:9090"

      - job_name: "requestflow-backend"
        metrics_path: "/metrics"
        static_configs:
          - targets:
              - "requestflow-backend:8000"