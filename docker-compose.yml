services:
  postgres:
    image: postgres:16
    container_name: requestflow-postgres
    environment:
      POSTGRES_USER: requestflow_user
      POSTGRES_PASSWORD: requestflow_password
      POSTGRES_DB: requestflow_db
    ports:
      - "5432:5432"
    volumes:
      - requestflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U requestflow_user -d requestflow_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: requestflow-backend
    environment:
      DATABASE_URL: postgresql+psycopg://requestflow_user:requestflow_password@postgres:5432/requestflow_db
      ALLOWED_ORIGINS: http://localhost:5173,http://localhost:5174
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  requestflow_postgres_data: