services:
  frontend:
    image: node:24-slim
    container_name: requestflow-frontend-remote
    working_dir: /app
    volumes:
      - ./frontend:/app
      - requestflow_frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: ${DEPLOYED_BACKEND_URL}
      CHOKIDAR_USEPOLLING: "true"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

volumes:
  requestflow_frontend_node_modules: